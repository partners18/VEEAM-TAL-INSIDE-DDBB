<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso — Always Partners</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #fff; font-family: 'Segoe UI', Arial, sans-serif;
           display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: #131820; border: 1px solid #1a2030; border-radius: 10px;
           padding: 2.5rem; width: 320px; }
    .logo { background: #00d15f; border-radius: 6px; padding: 8px 12px;
            font-weight: 700; font-size: 13px; color: #000; margin-bottom: 1.5rem; display: inline-block; }
    h2 { font-size: 16px; color: #ccc; margin-bottom: 0.4rem; }
    p { font-size: 11px; color: #3a4255; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.6rem 0.8rem; background: #0d1117;
            color: #ccc; border: 1px solid #22293a; border-radius: 5px;
            font-size: 13px; outline: none; margin-bottom: 0.8rem; }
    button { width: 100%; padding: 0.6rem; background: #00d15f; color: #000;
             font-weight: 700; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .err { color: #e74c3c; font-size: 11px; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">ALWAYS PARTNERS</div>
    <h2>Dashboard VEEAM</h2>
    <p>Introduce la contraseña para acceder</p>
    <input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Entrar</button>
    <div class="err" id="err">Contraseña incorrecta</div>
  </div>
  <script>
    function login() {
      const pwd = document.getElementById('pwd').value;
      if (pwd === 'Veeam2026') {
        sessionStorage.setItem('ap_auth', 'ok');
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
